id: rodoviasul_to_parquet
namespace: company.team
description: Extrai dados do banco MySQL Rodovia Sul e salva como arquivos Parquet

tasks:
  - id: extract_and_convert
    type: io.kestra.plugin.scripts.python.Script
    containerImage: ghcr.io/kestra-io/pydata:latest
    namespaceFiles:
      enabled: true
      include:
        - rs_export_to_parquet.py
    beforeCommands:
      - pip install mysql-connector-python pandas pyarrow python-dotenv boto3
    env:
      RODOVIASUL_HOST: "{{ kv('RS_RODOVIASUL_HOST') }}"
      RODOVIASUL_PORT: "{{ kv('RS_RODOVIASUL_PORT') }}"
      RODOVIASUL_DB: "{{ kv('RS_RODOVIASUL_DB') }}"
      RODOVIASUL_USER: "{{ kv('RS_RODOVIASUL_USER') }}"
      RODOVIASUL_PASSWORD: "{{ kv('RS_RODOVIASUL_PASSWORD') }}"
      SUPABASE_BUCKET: "parquet" # Nome do bucket que você criou no Supabase
      AWS_ACCESS_KEY_ID: "{{ kv('RS_AWS_ACCESS_KEY_ID') }}"
      AWS_SECRET_ACCESS_KEY: "{{ kv('RS_AWS_SECRET_ACCESS_KEY') }}"
      SUPABASE_S3_ENDPOINT: "{{ kv('RS_SUPABASE_S3_ENDPOINT') }}"
      AWS_DEFAULT_REGION: "{{ kv('RS_AWS_DEFAULT_REGION') }}"
    script: |
      import sys
      import subprocess
      
      # Executa o script de exportação
      subprocess.check_call([sys.executable, "rs_export_to_parquet.py"])

  - id: output_files
    type: io.kestra.plugin.core.storage.LocalFiles
    outputs:
      - output_parquet/*.parquet
